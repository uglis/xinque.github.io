<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>林方浩 · 文章</title>
    <meta name="description" content="林方浩的博客文章列表。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">跳到主要内容</a>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-radial" aria-hidden="true"></div>

    <header class="header">
      <a class="logo" href="./index.html">林方浩</a>
      <nav aria-label="站点导航">
        <a href="./index.html">首页</a>
        <a href="./posts.html">文章</a>
        <a href="./photos.html">照片</a>
      </nav>
    </header>

    <main id="main-content" class="page-main">
      <section class="panel reveal-target">
        <div class="panel-head">
          <p class="kicker">POSTS</p>
          <h1>文章</h1>
        </div>
        <p>这是我的文章列表。</p>
      </section>

      <section class="panel reveal-target posts-filters" aria-label="文章筛选">
        <label class="search-label" for="posts-search">搜索文章</label>
        <input
          id="posts-search"
          class="search-input"
          type="search"
          placeholder="搜索标题、摘要、正文、标签…"
          autocomplete="off"
        />
        <div id="posts-tags" class="tags-wrap" role="group" aria-label="按标签筛选"></div>
        <p id="posts-result-status" class="result-status" aria-live="polite"></p>
      </section>

      <section id="posts-list" class="list-grid reveal-target" aria-live="polite"></section>
    </main>

    <footer class="footer">© <span id="year"></span> 林方浩 · All Rights Reserved</footer>

    <script src="./script.js" defer></script>
  </body>
</html>
